<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HumanitAI — Hyper-Frames Prototype (scroll-driven Three.js)</title>
<style>
  :root{--brand:#14e0b0;--brand-deep:#0b8f74;--ink:#03100d;--amber:#ffb020;--alert:#ff5436}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:#e7efeb;font-family:Inter,-apple-system,sans-serif}
  /* ---- HYPER-FRAME STAGE ---- */
  .hf-stage{position:relative;height:160vh}          /* tall so there is scroll room to scrub */
  .hf-canvas-wrap{position:sticky;top:0;height:100vh;overflow:hidden}
  #hf-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hf-fallback{position:absolute;inset:0;background:radial-gradient(75% 70% at 30% 40%,rgba(20,224,176,.25),transparent 60%),radial-gradient(60% 60% at 80% 75%,rgba(255,176,32,.10),transparent 55%),var(--ink)}
  .hf-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 8vw;pointer-events:none}
  .hf-kicker{font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--brand);margin-bottom:18px}
  .hf-title{font-family:Fraunces,Georgia,serif;font-weight:500;font-size:clamp(2.4rem,7vw,6rem);line-height:.98;letter-spacing:-.04em;max-width:14ch}
  .hf-title em{font-style:italic;color:var(--brand)}
  .hf-sub{margin-top:22px;font-size:1.05rem;color:#8fa59c;max-width:46ch;line-height:1.6}
  .hf-progress{position:absolute;left:8vw;bottom:7vh;width:min(340px,60vw);height:2px;background:rgba(255,255,255,.1)}
  .hf-progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--amber));transition:width .1s linear}
  .hf-hint{position:absolute;right:8vw;bottom:7vh;font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  /* spacer so you can see it's tied to scroll */
  .tail{height:100vh;display:flex;align-items:center;justify-content:center;color:#5d6f68;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase}
  @media(prefers-reduced-motion:reduce){.hf-canvas-wrap{height:60vh}.hf-stage{height:auto}}
</style>
</head>
<body>

<section class="hf-stage">
  <div class="hf-canvas-wrap">
    <div class="hf-fallback" id="hf-fallback"></div>
    <canvas id="hf-canvas" aria-hidden="true"></canvas>
    <div class="hf-overlay">
      <div class="hf-kicker">The OSINT lens</div>
      <h1 class="hf-title">We watch the <em>signal</em><br>through the noise.</h1>
      <p class="hf-sub">Scroll. The field accelerates as our models resolve a region — thousands of public data points collapsing into one prediction.</p>
    </div>
    <div class="hf-progress"><i id="hf-bar"></i></div>
    <div class="hf-hint">Scroll to resolve</div>
  </div>
</section>
<div class="tail">— end of hyper-frame sequence —</div>

<script>
(function(){
  var cv=document.getElementById('hf-canvas');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){cv.style.display='none';document.getElementById('hf-fallback').style.opacity=1;return;}
  var io=new IntersectionObserver(function(e){
    if(e[0].isIntersecting){
      io.disconnect();
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
      s.onload=init; s.onerror=function(){cv.style.display='none';};
      document.head.appendChild(s);
    }
  },{threshold:.05});
  io.observe(cv);

  function init(){
    if(typeof THREE==='undefined'){cv.style.display='none';return;}
    /* ---- scroll progress (throttled via rAF) ---- */
    var stage=document.querySelector('.hf-stage');
    var scrollP=0,targetP=0,ticking=false;
    function compute(){
      var r=stage.getBoundingClientRect();
      var total=r.height-window.innerHeight;
      targetP=Math.min(1,Math.max(0,(-r.top)/total));
      ticking=false;
    }
    window.addEventListener('scroll',function(){
      if(!ticking){ticking=true;requestAnimationFrame(compute);}
    },{passive:true});
    compute();

    /* ---- scene ---- */
    var scene=new THREE.Scene();
    var cam=new THREE.PerspectiveCamera(62,window.innerWidth/window.innerHeight,0.1,400);
    cam.position.z=8;
    var renderer=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
    function size(){renderer.setSize(cv.clientWidth,cv.clientHeight,false);cam.aspect=cv.clientWidth/cv.clientHeight;cam.updateProjectionMatrix();}
    size();window.addEventListener('resize',size);

    var N=60, pts=[], pos=new Float32Array(N*3);
    for(var i=0;i<N;i++){
      var x=(Math.random()-.5)*22, y=(Math.random()-.5)*14, z=(Math.random()-.5)*30-10;
      pos[i*3]=x;pos[i*3+1]=y;pos[i*3+2]=z;
      pts.push({x:x,y:y,z:z,vx:(Math.random()-.5)*.02,vy:(Math.random()-.5)*.02});
    }
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    var mat=new THREE.PointsMaterial({color:0x14e0b0,size:0.16,transparent:true,opacity:0.85,sizeAttenuation:true});
    var cloud=new THREE.Points(geo,mat);scene.add(cloud);

    /* connecting lines (static-ish, recomputed each frame) */
    var links=[];
    for(var a=0;a<N;a++)for(var b=a+1;b<N;b++){var dx=pts[a].x-pts[b].x,dy=pts[a].y-pts[b].y,dz=pts[a].z-pts[b].z;if(Math.sqrt(dx*dx+dy*dy+dz*dz)<9)links.push(a,b);}
    var lgeo=new THREE.BufferGeometry();
    lgeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(links.length*3),3));
    var lmat=new THREE.LineBasicMaterial({color:0x0b8f74,transparent:true,opacity:0.12});
    var lines=new THREE.LineSegments(lgeo,lmat);scene.add(lines);

    /* ---- animation driven by scrollP ---- */
    var bar=document.getElementById('hf-bar');
    var running=true;document.addEventListener('visibilitychange',function(){running=!document.hidden;if(running)loop();});
    function loop(){
      if(!running)return;
      scrollP+=(targetP-scrollP)*0.08;               // ease toward target
      var speed=0.004+scrollP*0.14;                  // stars accelerate with scroll
      var arr=geo.attributes.position.array;
      for(var i=0;i<N;i++){
        pts[i].x+=pts[i].vx*speed*60;pts[i].y+=pts[i].vy*speed*60;
        if(Math.abs(pts[i].x)>11)pts[i].vx*=-1;if(Math.abs(pts[i].y)>7)pts[i].vy*=-1;
        arr[i*3]=pts[i].x;arr[i*3+1]=pts[i].y;arr[i*3+2]=pts[i].z;
      }
      geo.attributes.position.needsUpdate=true;
      // lines follow
      var la=lgeo.attributes.position.array;
      for(var k=0;k<links.length;k++){var id=links[k];la[k*3]=pts[id].x;la[k*3+1]=pts[id].y;la[k*3+2]=pts[id].z;}
      lgeo.attributes.position.needsUpdate=true;
      // camera dolly + fov pulse = "warp" as we resolve
      cam.position.z=8-scrollP*5;
      cam.fov=62+scrollP*22;cam.updateProjectionMatrix();
      cloud.rotation.z=scrollP*0.6;
      mat.size=0.16+scrollP*0.10;
      lmat.opacity=0.12+scrollP*0.25;
      bar.style.width=(scrollP*100)+'%';
      renderer.render(scene,cam);
      requestAnimationFrame(loop);
    }
    loop();
  }
})();
</script>
</body>
</html>
